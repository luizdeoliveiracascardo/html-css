<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudos de iframe</title>
    <style>
        iframe{
            height: 300px;
            width: 150px;
            border: 1px solid red;
        }
    </style>
</head>
<body>
    <h1>Testando o uso de iframe</h1>

    <!-- Tamanho padrão de um iframe: 300x150 px-->

    <p>Acessando o site do <iframe src="https://www.cursoemvideo.com" frameborder="0" height="500px" scolling="no"></iframe> para aprender a programar</p>
    <p>Alguns sites, por motivo de segurança, não permitem o funcionamento do <span style="color: red;">iframe</span>, como é mostrado a seguir. É o caso do <span style="color: red;">Google</span>.</p>
    <p>O site do <span style="color: red;">Google</span> 
        <iframe src="https://www.google.com" frameborder="1" height="500px" width="500px"> 
            <a href="http://www.google.com" target="_blank">Google</a>
        </iframe> é muito legal mas não funciona dentro do iframe</p>
</body>
</html>
