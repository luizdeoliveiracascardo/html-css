<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        table{
            border-collapse: collapse;
            width: 300px;
        }

        caption{
            font-size: 1em;
            font-weight: bold;
            padding: 10px;
            background-color: gray;
        }

        .tabela1{
            margin-bottom: 30px;
        }
        td{
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
    </style> 
</head>
<body>
    <h1>Mesclagem de Células</h1>
    <table class="tabela1">
        <caption>Tabela original</caption>        
            <tr>
                <td>A</td>
                <td>B</td>
                <td>C</td>
            </tr>
            <tr>
                <td>D</td>
                <td>E</td>
                <td>F</td>
            </tr>
            <tr>
                <td>G</td>
                <td>H</td>
                <td>I</td>
            </tr>
            <tr>
                <td>J</td>
                <td>L</td>
                <td>M</td>
            </tr>
    </table>        
        
    <table class="tabela2">
        <caption>Tabela com células mescladas</caption>
        <tr>
            <td>A</td>
            <td colspan="2">B</td>
        </tr>
        <tr>
            <td rowspan="3">D</td>
            <td>E</td>
            <td rowspan="2">F</td>
        </tr>
        <tr>
            <td>H</td>
        </tr>
        <tr>
            <td colspan="2">M</td>
        </tr>
    </table>    
</body>
</html>
